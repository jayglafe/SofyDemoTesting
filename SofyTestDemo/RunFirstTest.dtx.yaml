        - click:
            shot: DevOps Test Hub - TestProject - Execution_yd2cxg.dti.jpeg#9897
            object: html.span
            identifiers:
              - properties:
                  - content:
                      - val: Execute
        - do:
            steps:
              - pause: 10000ms
              - assign:
                  shot: DevOps Test Hub - TestProject - Execution_lwqv55.dti.jpeg#10005
                  object: html.td
                  identifiers:
                    - properties:
                        - position:
                            - val: '5 : 5'
                  properties:
                    - content:
                        - var: Done
            while: Done != 'Pass' && Done != 'Error'
        - click:
            shot: DevOps Test Hub - TestProject - Execution_lwqv55.dti.jpeg#10005
            object: html.div
            identifiers:
              - properties:
                  - content:
                      - val: Analyze
