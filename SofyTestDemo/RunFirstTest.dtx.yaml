            identifiers:
              - properties:
                  - content:
                      - val: Add Variable
        - click:
            shot: DevOps Test Hub - TestProject - Execution_lqgbf3.dti.jpeg#6345
            object: html.inputtext
            identifiers:
              - properties:
                  - label:
                      - val: Name
        - type:
            shot: DevOps Test Hub - TestProject - Execution_gkrm6z.dti.jpeg#6853
            object: html.inputtext
            identifiers:
              - properties:
