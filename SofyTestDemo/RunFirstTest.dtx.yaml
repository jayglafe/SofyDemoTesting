        - type:
            shot: DevOps Test Hub - TestProject - Execution_of2gw5.dti.jpeg#4371
            object: html.inputtext
            identifiers:
              - properties:
                  - label:
                      - val: Value
            value: '${Value}'
        - click:
            shot: DevOps Test Hub - TestProject - Execution_xll72y.dti.jpeg#5362
            object: html.button
            identifiers:
              - properties:
                  - content:
                      - val: Add
        - click:
            shot: DevOps Test Hub - TestProject - Execution_gnchj4.dti.jpeg#5793
