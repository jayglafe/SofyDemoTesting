note: Generated from recorded traffic using edge 145.0.3800.82
configuration:
  profile: edge
  vars:
    APP_SofyTestDemo_URL:
      expr: https://testhub.sbx0276.play.hclsofy.dev/test/
      type: val
      modifier: in
    Username:
      expr: demo.user
      type: val
      modifier: in
    Password:
      expr: 6114e1acb8ae610dcb6802a85da366d9d9b4a4c2c21d8aa36587470c5822e2d1
      type: val
      modifier: in
    Name:
      expr: hostname
      type: val
      modifier: in
    Value: commerce-preview.sbx0276.play.hclsofy.dev
    Name_2:
      expr: port_num
      type: val
      modifier: in
    Value_3:
      expr: '443'
      type: val
      modifier: in
    Done:
      expr: UnInitialized
      type: val
      modifier: in
steps:
  - open:
      enabled: 'false'
      note: Open SofyTestDemo
      url: '${APP_SofyTestDemo_URL}'
  - with:
      enabled: 'false'
      note: Sign in to platform
      steps:
        - click:
            shot: Sign in to platform_xp2upe.dti.jpeg#48
            object: html.inputtext
            identifiers:
              - properties:
                  - label:
                      - val: Username
        - type:
            shot: Sign in to platform_zpr2cy.dti.jpeg#86
            object: html.inputtext
            identifiers:
              - properties:
                  - label:
                      - val: Username
            value: '${Username}'
        - click:
            shot: Sign in to platform_fmuzzh.dti.jpeg#165
            object: html.inputpassword
            identifiers:
              - properties:
                  - label:
                      - val: Password
        - type:
            shot: Sign in to platform_j6jiuh.dti.jpeg#203
            object: html.inputpassword
            identifiers:
              - properties:
                  - label:
                      - val: Password
            value: '${Password}'
        - click:
            shot: Sign in to platform_n6vgtz.dti.jpeg#286
            object: html.button
            identifiers:
              - properties:
                  - content:
                      - val: Sign In
  - with:
      note: DevOps Test Hub - Initial - Team Space Dashboard
      steps:
        - click:
            shot: DevOps Test Hub - Initial - Team Space Dashboard_pe33lj.dti.jpeg#43
            object: html.img
            identifiers:
              - properties:
                  - src:
                      - val: content/images/banner-brand-icon-3.svg
        - click:
            shot: DevOps Test Hub - Initial - Team Space Dashboard_43iqlm.dti.jpeg#322
            object: html.span
            identifiers:
              - properties:
                  - content:
                      - val: TestProject
  - with:
