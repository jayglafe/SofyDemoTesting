configuration:
  profile: edge
  vars:
    gPrometheusIp:
      expr: ''
      type: val
      modifier: in
    gPrometheusPort:
      expr: ''
      type: val
      modifier: in
    gCommerceHostname:
      expr: commerce-preview.sbx0054.play.hclsofy.dev
      type: val
      modifier: in
    gCommercePort:
      expr: '443'
      type: val
      modifier: in
    gTestHubHostname:
      expr: testhub.sbx0054.play.hclsofy.dev
      type: val
      modifier: in
    gConsoleHostname:
      expr: sofy-console.sbx0054.play.hclsofy.dev
      type: val
      modifier: in
    gConsolePassword:
      expr: kjdR0UA8aq
      modifier: in
    gTestHubPassword:
      expr: fe251c0243c33efa23f5d12930d7a0c1a97ce707354e9013f37f1855cb4f6955
      type: val
      modifier: in
    githubUser:
      expr: jayglafe
      type: val
      modifier: in
steps:
  - run:
      url: asset://github.com%2Fjayglafe%2FSofyDemoTesting/SofyConsole/SofyConsoleHealthCheck.dtx.yaml
      in:
        APP_SofyConsole_URL: https://${gConsoleHostname}
        Password: '${gConsolePassword}'
      out:
        PrometheusIp:
          - gPrometheusIp
        PrometheusPort:
          - gPrometheusPort
  - run:
      url: Login.dtx.yaml
      in:
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
  - run: DeleteProject.dtx.yaml
  - run:
      url: NewProject.dtx.yaml
      in:
        APP_SofyConsole_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
        Username_2: '${githubUser}'
  - run:
      url: SetDevBranch.dtx.yaml
      in:
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
  - run:
      url: RunFirstTest.dtx.yaml
      in:
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
        Value: '${gCommerceHostname}'
        Value_3: '${gCommercePort}'
  - run:
      url: RunAPITests.dtx.yaml
      in:
        Password: '${gTestHubPassword}'
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
  - run:
      url: RunPostmanTest.dtx.yaml
      in:
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
        Username_2: '${githubUser}'
  - run:
      url: RunJMeter.dtx.yaml
      in:
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
  - run:
      url: RunPerformanceTest.dtx.yaml
      in:
        PrometheusIp: '${gPrometheusIp}'
        PrometheusPort: '${gPrometheusPort}'
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
        Target_host: '${gPrometheusIp}'
  - run:
      url: RunSecondTest.dtx.yaml
      in:
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
        Value: '${gCommerceHostname}'
        Value_3: '${gCommercePort}'
  - run:
      url: RunWithDDF.dtx.yaml
      in:
        Password: '${gTestHubPassword}'
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
  - run:
      url: RunWithNewData.dtx.yaml
      in:
        APP_SofyTestDemo_URL: https://${gTestHubHostname}/test/
        Password: '${gTestHubPassword}'
