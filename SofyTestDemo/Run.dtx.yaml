configuration:
  profile: edge
  vars:
    gPrometheusIp: ''
    gPrometheusPort: ''
steps:
  - run:
      url: asset://github.com%2Fjayglafe%2FSofyDemoTesting/SofyConsole/SofyConsoleHealthCheck.dtx.yaml
      out:
        PrometheusIp:
          - gPrometheusIp
        PrometheusPort:
          - gPrometheusPort
  - log: 'Ip / Port : ${gPrometheusIp} ${gPrometheusPort}'
  - run: Login.dtx.yaml
  - run: NewProject.dtx.yaml
  - run: SetDevBranch.dtx.yaml
  - run: RunFirstTest.dtx.yaml
  - run: RunAPITests.dtx.yaml
  - run: RunPostmanTest.dtx.yaml
  - run: RunJMeter.dtx.yaml
  - run:
      url: RunPerformanceTest.dtx.yaml
      in:
        PrometheusIp: '${gPrometheusIp}'
        PrometheusPort: '${gPrometheusPort}'
